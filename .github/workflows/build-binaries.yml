# The ONE place dig-app's cross-OS binary build lives. It is a REUSABLE workflow
# (`on: workflow_call` only): both release paths call it, so the OS/arch matrix + toolchain setup
# are defined exactly once (DRY, CLAUDE.md §2.5):
#
#   * release.yml         — the STABLE `vX.Y.Z` tag builder, and
#   * nightly-release.yml  — the NIGHTLY pre-release channel.
#
# The caller passes the version string stamped into each artifact's filename and, optionally, the
# git ref to build. For every supported OS/arch this builds BOTH first-class dig-app binaries
# (per the epic #908 form factors):
#   * `dig-app` — the branded per-user tray / menu-bar identity agent (degrades headless), and
#   * `dign`    — the DIG user CLI.
#
# ASSET NAMING (SPEC §Release) — each per-OS/arch binary is published under the canonical name
# `<bin>-<ver>-<os>-<arch>[.exe]` (e.g. `dig-app-1.2.3-linux-x64`, `dign-1.2.3-windows-x64.exe`) —
# the stems the dig-installer + apt.dig.net packaging resolve.
#
# RICHER OS PACKAGES (Windows MSI/tray installer, macOS .app/.pkg, Linux .deb) are produced by the
# dig-installer wiring (epic #908 U8, a separate repo) which consumes these raw binaries; this
# reusable build stays the single source of the binaries themselves. NO linux-arm64 asset is
# published (no consumer requests it; matches dig-node).
name: Build binaries (reusable)

on:
  workflow_call:
    inputs:
      version:
        description: "Version string stamped into each artifact filename (e.g. `1.2.3` or `1.2.3-nightly.20260714.abc1234`)."
        type: string
        required: true
      ref:
        description: "Git ref (tag / branch / SHA) to check out and build. Empty = the caller run's commit."
        type: string
        required: false
        default: ""

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_RELEASE_DEBUG: "0"

jobs:
  # Gate: fmt + clippy on Linux, once. A ref that doesn't pass the gate never produces release
  # binaries. The full test+coverage set ran on the PR (ci.yml) / the nightly test-gate.
  check:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - name: Install Rust (stable + components)
        run: |
          rustup toolchain install stable --component rustfmt --component clippy
          rustup default stable
          rustc --version
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  build:
    name: build (${{ matrix.out_name }})
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            out_name: windows-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            out_name: linux-x64
          - os: macos-14 # Apple silicon (arm64)
            target: aarch64-apple-darwin
            ext: ""
            out_name: macos-arm64
          - os: macos-14 # Apple silicon — cross-compiles the Intel binary
            target: x86_64-apple-darwin
            ext: ""
            out_name: macos-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - name: Install Rust + target
        shell: bash
        run: |
          rustup toolchain install stable
          rustup default stable
          rustup target add ${{ matrix.target }}
          rustc --version
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build release binaries (dig-app + dign)
        run: cargo build --release --locked --target ${{ matrix.target }} --bin dig-app --bin dign
      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          VER="${{ inputs.version }}"
          EXT="${{ matrix.ext }}"
          mkdir -p dist
          for bin in dig-app dign; do
            SRC="target/${{ matrix.target }}/release/${bin}${EXT}"
            test -f "$SRC" || { echo "binary not produced: $SRC"; exit 1; }
            cp "$SRC" "dist/${bin}-${VER}-${{ matrix.out_name }}${EXT}"
          done
          ls -la dist
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dig-app-${{ matrix.out_name }}
          path: dist/*
          if-no-files-found: error
